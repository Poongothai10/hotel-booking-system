name: CI/CD Pipeline - Secure Hotel Booking

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Install and Build
      run: |
        cd frontend
        npm install --no-package-lock --legacy-peer-deps
        npm run build
        cd ../backend
        npm install --no-package-lock --legacy-peer-deps

  deploy-aws:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
